<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドクターヘリ業務日報・活動タイムライン (安定版)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <style>
        @media print {
            @page { size: landscape; margin: 5mm; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: white; transform: scale(0.8); transform-origin: top left; width: 125%; height: 100%; overflow: visible; margin: 0; padding: 0; }
            .no-print, #input-form-area { display: none !important; }
            .print-full-width { width: 100% !important; min-width: 0 !important; }
            .print-break-avoid { page-break-inside: avoid; }
            .print-header-compact { display: flex !important; flex-wrap: wrap; gap: 16px; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 2px; margin-bottom: 4px; font-size: 11pt; }
            .print-header-item { display: flex; align-items: center; white-space: nowrap; }
            .print-reason-box { font-size: 10pt; border: 1px solid #ddd; padding: 2px 4px; margin-bottom: 4px; min-height: auto !important; }
            .print-chart-container { height: 120px !important; min-height: 120px !important; margin-bottom: 4px !important; border: 1px solid #ddd !important; overflow: hidden !important; position: relative !important; background-color: white !important; }
            .print-time-label { top: 0 !important; font-size: 9pt !important; line-height: 1.5 !important; height: 20px !important; }
            .print-grid-line { top: 20px !important; bottom: 0 !important; height: auto !important; }
            .print-chart-bar-wrapper { top: 35px !important; transform: none !important; }
            .print-chart-bar { height: 40px !important; min-height: 40px !important; } 
            .print-icon-size { width: 14px !important; height: 14px !important; }
            .print-list-header th { padding: 2px 4px !important; font-size: 10pt !important; background-color: #f3f4f6 !important; border-bottom: 1px solid #ccc !important; }
            .print-list-row td { padding: 3px 4px !important; font-size: 10pt !important; line-height: 1.2 !important; border-bottom: 1px solid #eee !important; }
            .print-wrap-text { white-space: pre-wrap !important; word-break: break-all !important; }
            .print-footer { position: fixed; bottom: 0; right: 0; width: 100%; text-align: right; font-size: 9pt; color: #888; padding-top: 2px; border-top: 1px solid #eee; background: white; }
        }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">

    <div class="p-4 max-w-full mx-auto min-h-screen font-sans print:bg-white print:p-0">
        
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 mb-4 overflow-hidden print:border-0 print:shadow-none print:mb-2 print-break-avoid">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 print:bg-white print:border-b-2 print:border-slate-800 print:px-0">
                <div class="flex items-center gap-2">
                    <span id="icon-clipboard" class="text-blue-600 print:text-black"></span>
                    <h1 class="text-lg font-bold text-slate-800 print:text-black print:text-xl">業務日報データ / 活動実績チャート</h1>
                </div>
                <div class="flex gap-2 no-print items-center h-10">
                    <button onclick="toggleModal('modal-manual')" class="h-10 px-3 rounded border border-blue-200 bg-blue-50 text-blue-600 hover:bg-blue-100 flex items-center gap-1 transition-colors text-xs"><span id="icon-book"></span> 説明書</button>
                    <button onclick="toggleModal('modal-qr')" class="h-10 px-3 rounded border border-slate-300 hover:bg-slate-100 text-slate-600 flex items-center gap-1 transition-colors text-xs"><span id="icon-qrcode"></span></button>
                    <div class="h-6 w-px bg-slate-300 mx-1"></div>
                    <button onclick="resetData()" class="h-10 px-3 rounded border border-red-200 bg-red-50 text-red-600 hover:bg-red-100 flex items-center gap-1 transition-colors font-bold text-xs"><span id="icon-rotate"></span> 新規作成</button>
                    <div class="h-6 w-px bg-slate-300 mx-1"></div>
                    <button onclick="window.print()" class="h-10 px-3 rounded bg-slate-700 hover:bg-slate-800 text-white flex items-center gap-1 transition-colors font-medium text-xs"><span id="icon-printer"></span> 印刷/PDF</button>
                    <button onclick="exportCSV()" class="h-10 px-3 rounded bg-green-600 hover:bg-green-700 text-white flex items-center gap-1 transition-colors font-medium text-xs"><span id="icon-spreadsheet"></span> CSV出力</button>
                    <button onclick="sendMail()" class="h-10 px-3 rounded bg-sky-500 hover:bg-sky-600 text-white flex items-center gap-1 transition-colors font-medium text-xs"><span id="icon-mail"></span> メール作成</button>
                </div>
            </div>

            <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6 print:p-0 print:gap-4 print:mt-4">
                <div class="space-y-4 print:space-y-2">
                    <div class="print:flex print:gap-4 items-center print-header-compact">
                        <div class="print-header-item">
                            <label class="block text-xs font-bold text-slate-500 mb-1 print:hidden">日付</label>
                            <div class="print:hidden"><input type="date" id="info-date" class="w-full text-sm border-slate-300 rounded-md shadow-sm p-2 border" onchange="updateSunTimes()"></div>
                            <div class="hidden print:block"><span class="font-bold mr-1">日付:</span> <span id="print-date-display"></span></div>
                        </div>
                        <div class="print-header-item hidden print:block border-l border-slate-300 pl-3 ml-3">
                            <div class="flex gap-2 text-[9px] text-slate-600" id="print-sun-display"></div>
                        </div>
                        <div class="ml-4 flex gap-3 text-[10px] bg-amber-50 px-2 py-1 rounded border border-amber-100 text-amber-800 print:hidden" id="web-sun-display"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 print:flex print:gap-4 print-header-compact" style="border: none;">
                        <div class="print-header-item">
                            <label class="block text-xs font-bold text-slate-500 mb-1 print:hidden">記載者</label>
                            <div class="relative print:hidden">
                                <div class="absolute left-2 top-2.5"><span id="icon-user1" class="text-slate-400"></span></div>
                                <input type="text" id="info-recorder" placeholder="氏名" class="w-full pl-8 text-sm border-slate-300 rounded-md shadow-sm p-2 border">
                            </div>
                            <div class="hidden print:block"><span class="font-bold mr-1">記載者:</span> <span id="print-recorder-display"></span></div>
                        </div>
                        <div class="print-header-item">
                            <label class="block text-xs font-bold text-slate-500 mb-1 print:hidden">担当医師</label>
                            <div class="relative print:hidden">
                                <div class="absolute left-2 top-2.5"><span id="icon-user2" class="text-slate-400"></span></div>
                                <input type="text" id="info-doctor" placeholder="氏名" class="w-full pl-8 text-sm border-slate-300 rounded-md shadow-sm p-2 border">
                            </div>
                            <div class="hidden print:block"><span class="font-bold mr-1">担当医師:</span> <span id="print-doctor-display"></span></div>
                        </div>
                    </div>
                </div>
                
                <div class="md:col-span-2 print:mt-0">
                    <label class="block text-xs font-bold text-slate-500 mb-2 print:hidden">浜町待機理由 / 特記事項</label>
                    <div class="print:hidden mb-2 flex flex-wrap gap-3" id="reason-checkboxes">
                        </div>
                    <input type="text" id="info-other-reason" placeholder="その他・特記事項 (フリーコメント)" class="w-full text-sm border-slate-300 rounded-md shadow-sm p-2 border print:hidden" oninput="updateReasonSummary()">
                    <div class="hidden print:block print-reason-box">
                        <span class="font-bold mr-2">待機理由/備考:</span>
                        <span id="print-reason-display">特になし</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="input-form-area" class="bg-white rounded-xl shadow-sm border border-slate-200 mb-6 overflow-hidden transition-all no-print">
            <div id="form-header" class="px-6 py-3 border-b flex items-center justify-between bg-blue-50/50 border-blue-100">
                <div class="flex items-center gap-2">
                    <span id="form-header-icon" class="text-blue-500"></span>
                    <span id="form-header-title" class="text-sm font-bold text-blue-900">タイムライン項目の追加</span>
                </div>
                <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden text-xs flex items-center gap-1 text-slate-500 hover:text-slate-700 bg-white px-2 py-1 rounded border border-slate-200"><span id="icon-x"></span> 編集キャンセル</button>
            </div>
            
            <div class="p-6 grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                <div class="md:col-span-4">
                    <label class="block text-xs font-bold text-slate-500 mb-1">業務種別</label>
                    <select id="f-category" class="w-full text-sm border-slate-300 rounded-md shadow-sm p-2 border focus:border-blue-500"></select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 mb-1">事案No.</label>
                    <input type="text" id="f-no" placeholder="12345" class="w-full text-sm border-slate-300 rounded-md shadow-sm p-2 border" onkeydown="handleEnter(event, 'f-start')">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-slate-500 mb-1">開始時間</label>
                    <input type="time" id
