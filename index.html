
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドクターヘリ業務日報・活動タイムライン</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <!-- 印刷用スタイル -->
    <style>
        @media print {
            @page { size: landscape; margin: 5mm; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: white; }
            .no-print { display: none !important; }
            .print-full-width { width: 100% !important; min-width: 0 !important; overflow: visible !important; }
            .print-break-avoid { page-break-inside: avoid; }
            
            /* 印刷時にフォームエリアを確実に隠す */
            #input-form-area { display: none !important; }
        }
        /* スクロールバー装飾 */
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .animate-fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- アイコンコンポーネント ---
        const Icon = ({ path, className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const Icons = {
            Calendar: (props) => <Icon {...props} path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />,
            ArrowRight: (props) => <Icon {...props} path={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />,
            AlertCircle: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />,
            CheckCircle: (props) => <Icon {...props} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
            ClipboardList: (props) => <Icon {...props} path={<><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 12h.01"/><path d="M13 12h5"/><path d="M9 16h.01"/><path d="M13 16h5"/><path d="M9 8h.01"/><path d="M13 8h5"/></>} />,
            Plus: (props) => <Icon {...props} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />,
            Trash2: (props) => <Icon {...props} path={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />,
            RotateCcw: (props) => <Icon {...props} path={<><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></>} />,
            Briefcase: (props) => <Icon {...props} path={<><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>} />,
            Users: (props) => <Icon {...props} path={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />,
            Settings: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>} />,
            FileSpreadsheet: (props) => <Icon {...props} path={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M10 9v8"/></>} />,
            User: (props) => <Icon {...props} path={<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />,
            Edit3: (props) => <Icon {...props} path={<><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></>} />,
            X: (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />,
            Printer: (props) => <Icon {...props} path={<><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></>} />,
            QrCode: (props) => <Icon {...props} path={<><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><path d="M3 14h7v7H3z"/></>} />,
            BookOpen: (props) => <Icon {...props} path={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />,
        };

        const DailyTimelineApp = () => {
            const START_HOUR = 8;
            const END_HOUR = 19;
            const TOTAL_HOURS = END_HOUR - START_HOUR;
            const TOTAL_MINUTES = TOTAL_HOURS * 60;

            const CATEGORIES = {
                MISSION: { id: 'mission', label: 'ヘリ活動 (実施)', color: 'bg-blue-600 border-blue-700', hasPrep: true, hasRecovery: true },
                CANCEL: { id: 'cancel', label: 'ヘリ活動 (キャンセル)', color: 'bg-gray-400 border-gray-500', hasPrep: true, hasRecovery: true },
                INSPECTION: { id: 'inspection', label: '始業点検・整備', color: 'bg-orange-400 border-orange-500', hasPrep: false, hasRecovery: false },
                GROUP: { id: 'group', label: 'グループ業務/会議', color: 'bg-teal-500 border-teal-600', hasPrep: false, hasRecovery: false },
                OTHER: { id: 'other', label: 'その他活動', color: 'bg-purple-500 border-purple-600', hasPrep: false, hasRecovery: false },
            };

            const INITIAL_EVENTS = [
                { id: '19248', category: 'mission', no: '19248', start: '08:46', end: '09:13', desc: '浜町HP〜LZ移動(12分)・待機 → 09:01接触 → 09:13引継完了。LZより次事案へ。', isContinuous: true },
                { id: '19249', category: 'mission', no: '19249', start: '09:22', end: '10:24', desc: '19248LZより直行 → 鹿児島医療センター受入 → 浜町HP引継終了', isContinuous: false },
                { id: '19253', category: 'cancel', no: '19253', start: '11:18', end: '11:26', desc: '上空キャンセル（救急隊のみで対応可能）', isContinuous: false },
                { id: '19254', category: 'cancel', no: '19254', start: '12:09', end: '12:29', desc: '上空キャンセル → そのまま次事案対応', isContinuous: true },
                { id: '19255', category: 'mission', no: '19255', start: '12:29', end: '13:44', desc: '浜町HP離陸 → 現場活動 → 基地病院引継 → 浜町HP帰投', isContinuous: false },
                { id: '19256', category: 'mission', no: '19256', start: '14:19', end: '15:17', desc: '浜町HP離陸 → 現場活動 → 基地病院引継 → 浜町HP帰投', isContinuous: false },
                { id: '19257', category: 'mission', no: '19257', start: '15:55', end: '17:18', desc: '浜町HP離陸 → 他医療機関へ搬送 → 浜町HP帰投', isContinuous: false },
                { id: 'inspection-1', category: 'inspection', no: '', start: '08:30', end: '08:46', desc: '始業前点検・ブリーフィング（要請により中断）', isContinuous: false },
            ];

            const [reportInfo, setReportInfo] = useState({ date: '2025-12-23', recorder: '', doctor: '', hamamachiReason: '' });
            const [events, setEvents] = useState(INITIAL_EVENTS);
            const [formData, setFormData] = useState({ category: 'mission', no: '', start: '', end: '', desc: '', isContinuous: false });
            const [editingId, setEditingId] = useState(null);
            const [hoveredId, setHoveredId] = useState(null);
            const [showQr, setShowQr] = useState(false);
            const [showManual, setShowManual] = useState(false);
            const qrCanvasRef = useRef(null);

            // Refs for focusing
            const categoryRef = useRef(null);
            const noRef = useRef(null);
            const startRef = useRef(null);
            const endRef = useRef(null);
            const descRef = useRef(null);
            const continuousRef = useRef(null);

            // --- ヘルパー関数 ---
            const timeToMinutes = (timeStr) => {
                if (!timeStr) return 0;
                const [hours, minutes] = timeStr.split(':').map(Number);
                return (hours - START_HOUR) * 60 + minutes;
            };

            const getRecoveryDuration = (event) => {
                const cat = Object.values(CATEGORIES).find(c => c.id === event.category);
                if (!cat || !cat.hasRecovery) return 0;
                if (event.isContinuous) return 0;
                const duration = timeToMinutes(event.end) - timeToMinutes(event.start);
                if (event.category === 'cancel') return 10;
                if (duration < 60) return 30;
                return 45;
            };

            const getBasePrepDuration = (event) => {
                const cat = Object.values(CATEGORIES).find(c => c.id === event.category);
                if (!cat || !cat.hasPrep) return 0;
                return 10;
            };

            const getPosition = (startMins, duration) => {
                const left = (startMins / TOTAL_MINUTES) * 100;
                const width = (duration / TOTAL_MINUTES) * 100;
                return { left: `${left}%`, width: `${width}%` };
            };

            // --- イベントハンドラ ---
            const handleReportInfoChange = (e) => setReportInfo(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.type === 'checkbox' ? e.target.checked : e.target.value }));

            // Enterキーでのフォーカス移動
            const handleKeyDown = (e, nextRef) => {
                if (e.nativeEvent.isComposing) return;
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (nextRef && nextRef.current) {
                        nextRef.current.focus();
                    } else {
                        handleAddOrUpdate();
                    }
                }
            };

            const handleEditClick = (event) => {
                setEditingId(event.id);
                setFormData({ category: event.category, no: event.no || '', start: event.start, end: event.end, desc: event.desc, isContinuous: event.isContinuous });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleCancelEdit = () => {
                setEditingId(null);
                setFormData({ category: 'mission', no: '', start: '', end: '', desc: '', isContinuous: false });
            };

            const handleAddOrUpdate = () => {
                if (!formData.start || !formData.end) {
                    alert('開始時間と終了時間は必須です。');
                    return;
                }
                
                if (editingId) {
                    const updatedEvents = events.map(ev => ev.id === editingId ? { ...formData, id: editingId } : ev).sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));
                    setEvents(updatedEvents);
                    setEditingId(null);
                } else {
                    const newEvent = { ...formData, id: Date.now().toString() };
                    setEvents([...events, newEvent].sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start)));
                }
                
                // データ追加後のリセット処理（カテゴリは維持）
                setFormData(prev => ({
                    category: prev.category, 
                    no: '',
                    start: '',
                    end: '',
                    desc: '',
                    isContinuous: false
                }));
                
                if (categoryRef.current) categoryRef.current.focus();
            };

            const handleDelete = (id) => {
                if (window.confirm('この項目を削除しますか？')) {
                    setEvents(events.filter(e => e.id !== id));
                    if (editingId === id) handleCancelEdit();
                }
            };

            const handleReset = () => {
                if(window.confirm('入力内容を全てクリアしますか？')) {
                    setEvents([]);
                    setEditingId(null);
                    setReportInfo({ date: new Date().toISOString().split('T')[0], recorder: '', doctor: '', hamamachiReason: '' });
                }
            };

            const handlePrint = () => {
                if (window.location.protocol !== 'file:' && window.location.hostname === '') {
                     alert("注意: プレビュー画面では印刷が正しく機能しない場合があります。ファイルをダウンロードして開いてから印刷してください。");
                }
                window.print();
            };

            const handleExportCSV = () => {
                const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
                let csvContent = `日付,${reportInfo.date}\n記載者,${reportInfo.recorder}\n担当医師,${reportInfo.doctor}\n浜町待機理由,${reportInfo.hamamachiReason.replace(/,/g, '、')}\n\n`;
                csvContent += "ID,事案番号,種別,開始時間,終了時間,活動時間(分),準備(分),復帰(分),連続出動,内容\n";
                const sortedEvents = [...events].sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));
                sortedEvents.forEach((event, index) => {
                    const duration = timeToMinutes(event.end) - timeToMinutes(event.start);
                    let prep = getBasePrepDuration(event);
                    if (index > 0 && sortedEvents[index - 1].isContinuous) prep = 0;
                    const recovery = getRecoveryDuration(event);
                    const catLabel = Object.values(CATEGORIES).find(c => c.id === event.category)?.label || '';
                    const row = [
                        event.id, event.no, catLabel, event.start, event.end, duration, prep > 0 ? prep : '', recovery > 0 ? recovery : '', event.isContinuous ? '○' : '', `"${event.desc.replace(/"/g, '""')}"`
                    ].join(",");
                    csvContent += row + "\n";
                });
                const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `daily_report_${reportInfo.date.replace(/-/g, '')}.csv`;
                link.click();
            };

            const toggleQr = () => setShowQr(!showQr);
            const toggleManual = () => setShowManual(!showManual);

            useEffect(() => {
                if (showQr && qrCanvasRef.current) {
                    new QRious({
                        element: qrCanvasRef.current,
                        value: window.location.href,
                        size: 150
                    });
                }
            }, [showQr]);

            const sortedEvents = [...events].sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));

            return (
                <div className="p-4 max-w-full mx-auto min-h-screen font-sans print:bg-white print:p-0">
                    
                    {/* Header */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 mb-4 overflow-hidden print:border-0 print:shadow-none print:mb-2 print-break-avoid">
                        <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 print:bg-white print:border-b-2 print:border-slate-800 print:px-0">
                            <div className="flex items-center gap-2">
                                <Icons.ClipboardList className="w-5 h-5 text-blue-600 print:text-black" />
                                <h1 className="text-lg font-bold text-slate-800 print:text-black print:text-xl">業務日報データ / 活動実績チャート</h1>
                            </div>
                            <div className="flex gap-2 no-print items-center">
                                <button onClick={toggleManual} className="text-xs px-2 py-1.5 rounded border border-blue-200 bg-blue-50 text-blue-600 hover:bg-blue-100 flex items-center gap-1 transition-colors" title="マニュアルを表示"><Icons.BookOpen className="w-3.5 h-3.5"/> 説明書</button>
                                <button onClick={toggleQr} className="text-xs px-2 py-1.5 rounded border border-slate-300 hover:bg-slate-100 text-slate-600 flex items-center gap-1 transition-colors" title="現在のページのQRコードを表示"><Icons.QrCode className="w-3.5 h-3.5"/></button>
                                <div className="h-4 w-px bg-slate-300 mx-1"></div>
                                <button onClick={handleReset} className="text-xs px-3 py-1.5 rounded border border-slate-300 hover:bg-slate-100 text-slate-600 flex items-center gap-1 transition-colors"><Icons.RotateCcw className="w-3 h-3"/> クリア</button>
                                <button onClick={handlePrint} className="text-xs px-3 py-1.5 rounded bg-slate-700 hover:bg-slate-800 text-white flex items-center gap-1 transition-colors font-medium"><Icons.Printer className="w-3.5 h-3.5"/> 印刷/PDF</button>
                                <button onClick={handleExportCSV} className="text-xs px-3 py-1.5 rounded bg-green-600 hover:bg-green-700 text-white flex items-center gap-1 transition-colors font-medium"><Icons.FileSpreadsheet className="w-3.5 h-3.5"/> CSV出力</button>
                            </div>
                        </div>

                        {/* Manual Modal */}
                        {showManual && (
                            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 no-print" onClick={toggleManual}>
                                <div className="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[80vh] overflow-y-auto p-6" onClick={e => e.stopPropagation()}>
                                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                                        <h2 className="text-lg font-bold flex items-center gap-2"><Icons.BookOpen className="w-5 h-5 text-blue-600"/> 運用マニュアル・定義書</h2>
                                        <button onClick={toggleManual} className="text-slate-400 hover:text-slate-600"><Icons.X className="w-5 h-5"/></button>
                                    </div>
                                    <div className="prose prose-sm text-slate-700">
                                        <h3 className="font-bold text-slate-900 mb-2">1. 業務種別の定義</h3>
                                        <ul className="list-disc pl-5 mb-4 space-y-1">
                                            <li><span className="font-bold text-blue-700">ヘリ活動 (実施):</span> 通常の患者搬送等のミッション完了。</li>
                                            <li><span className="font-bold text-gray-600">ヘリ活動 (キャンセル):</span> 現場や上空でのキャンセル。</li>
                                            <li><span className="font-bold text-orange-600">始業点検・整備:</span> 始業前点検、定時点検など。</li>
                                            <li><span className="font-bold text-teal-600">グループ業務/会議:</span> ブリーフィング、カンファレンスなど。</li>
                                        </ul>

                                        <h3 className="font-bold text-slate-900 mb-2">2. 時間の自動計算ルール</h3>
                                        <div className="bg-slate-50 p-3 rounded mb-4 border border-slate-200">
                                            <p className="font-bold mb-1">準備時間 (10分)</p>
                                            <p className="text-xs mb-2">「ヘリ活動」の開始10分前を自動的に準備時間として表示します。ただし、前の事案が「連続出動」の場合は表示されません。</p>
                                            <p className="font-bold mb-1">復帰時間</p>
                                            <ul className="list-disc pl-5 text-xs">
                                                <li>キャンセル: <strong>+10分</strong></li>
                                                <li>活動1時間未満: <strong>+30分</strong></li>
                                                <li>活動1時間以上: <strong>+45分</strong></li>
                                                <li>連続出動: <strong>0分</strong></li>
                                            </ul>
                                        </div>

                                        <h3 className="font-bold text-slate-900 mb-2">3. 入力・操作方法</h3>
                                        <ul className="list-disc pl-5 mb-4 space-y-1">
                                            <li><strong>Enterキー:</strong> 次の入力欄へ移動します。「連続出動」チェックボックスでEnterを押すとデータが追加されます。</li>
                                            <li><strong>連続出動:</strong> 帰投せず次の事案へ向かう場合チェックします。復帰時間が0になり、次の事案の準備時間も省略されます。</li>
                                            <li><strong>印刷/PDF:</strong> 画面右上のボタンから、入力フォームを除いたきれいな状態で印刷・PDF保存が可能です。</li>
                                        </ul>
                                    </div>
                                    <div className="mt-6 text-right">
                                        <button onClick={toggleManual} className="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">閉じる</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* QR Code Modal */}
                        {showQr && (
                            <div className="bg-slate-50 p-4 border-b border-slate-200 flex flex-col items-center justify-center animate-fade-in no-print">
                                <p className="text-xs text-slate-500 mb-2">このページのURL用QRコード (Web公開時に使用)</p>
                                <canvas ref={qrCanvasRef}></canvas>
                                <p className="text-[10px] text-slate-400 mt-1 break-all max-w-xs text-center">{window.location.href}</p>
                            </div>
                        )}

                        <div className="p-6 grid grid-cols-1 md:grid-cols-3 gap-6 print:p-0 print:gap-4 print:mt-4">
                            <div className="space-y-4 print:space-y-2">
                                <div className="print:flex print:gap-4 items-center">
                                    <label className="block text-xs font-bold text-slate-500 mb-1 print:hidden">日付</label>
                                    <div className="print:hidden"><input type="date" name="date" value={reportInfo.date} onChange={handleReportInfoChange} className="w-full text-sm border-slate-300 rounded-md shadow-sm p-2 border" /></div>
                                    <div className="hidden print:block text-sm"><span className="font-bold mr-2">日付:</span> {reportInfo.date}</div>
                                </div>
                                <div className="grid grid-cols-2 gap-2 print:flex print:gap-6">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1 print:hidden">記載者</label>
                                        <div className="relative print:hidden">
                                            <div className="absolute left-2 top-2.5"><Icons.User className="w-4 h-4 text-slate-400" /></div>
                                            <input type="text" name="recorder" value={reportInfo.recorder} onChange={handleReportInfoChange} placeholder="氏名" className="w-full pl-8 text-sm border-slate-300 rounded-md shadow-sm p-2 border" />
                                        </div>
                                        <div className="hidden print:block text-sm"><span className="font-bold mr-2">記載者:</span> {reportInfo.recorder || '(未入力)'}</div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1 print:hidden">担当医師</label>
                                        <div className="relative print:hidden">
                                            <div className="absolute left-2 top-2.5"><Icons.User className="w-4 h-4 text-slate-400" /></div>
                                            <input type="text" name="doctor" value={reportInfo.doctor} onChange={handleReportInfoChange} placeholder="氏名" className="w-full pl-8 text-sm border-slate-300 rounded-md shadow-sm p-2 border" />
                                        </div>
                                        <div className="hidden print:block text-sm"><span className="font-bold mr-2">担当医師:</span> {reportInfo.doctor || '(未入力)'}</div>
                                    </div>
                                </div>
                            </div>
                            <div className="md:col-span-2 print:mt-2">
                                <label className="block text-xs font-bold text-slate-500 mb-1 print:hidden">浜町待機理由 / 特記事項</label>
                                <textarea name="hamamachiReason" value={reportInfo.hamamachiReason} onChange={handleReportInfoChange} placeholder="天候不良（東風）のため待機、機体不具合など..." className="w-full h-24 text-sm border-slate-300 rounded-md shadow-sm resize-none print:hidden p-2 border" />
                                <div className="hidden print:block text-sm border border-slate-300 rounded p-2 min-h-[60px]">
                                    <span className="font-bold block text-xs text-slate-500 mb-1">浜町待機理由 / 特記事項:</span>
                                    {reportInfo.hamamachiReason || '特になし'}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Input Form Area (ID for print hiding + Tailwind print:hidden) */}
                    <div id="input-form-area" className={`bg-white rounded-xl shadow-sm border mb-6 overflow-hidden transition-all no-print print:hidden ${editingId ? 'border-amber-400 ring-2 ring-amber-100' : 'border-slate-200'}`}>
                        <div className={`px-6 py-3 border-b flex items-center justify-between ${editingId ? 'bg-amber-50 border-amber-200' : 'bg-blue-50/50 border-blue-100'}`}>
                            <div className="flex items-center gap-2">
                                {editingId ? <Icons.Edit3 className="w-4 h-4 text-amber-600" /> : <Icons.Plus className="w-4 h-4 text-blue-500" />}
                                <span className={`text-sm font-bold ${editingId ? 'text-amber-800' : 'text-blue-900'}`}>{editingId ? 'タイムライン項目の修正' : 'タイムライン項目の追加'}</span>
                            </div>
                            {editingId && (
                                <button onClick={handleCancelEdit} className="text-xs flex items-center gap-1 text-slate-500 hover:text-slate-700 bg-white px-2 py-1 rounded border border-slate-200"><Icons.X className="w-3 h-3" /> 編集キャンセル</button>
                            )}
                        </div>
                        
                        <div className="p-6 grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                            {/* 上段: 種別, No, 開始, 終了 */}
                            <div className="md:col-span-4">
                                <label className="block text-xs font-bold text-slate-500 mb-1">業務種別</label>
                                <select 
                                    ref={categoryRef}
                                    name="category" 
                                    value={formData.category} 
                                    onChange={handleInputChange} 
                                    onKeyDown={(e) => handleKeyDown(e, noRef)}
                                    className="w-full text-sm border-slate-300 rounded-md shadow-sm p-2 border focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                                >
                                    {Object.values(CATEGORIES).map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                </select>
                            </div>
                            <div className="md:col-span-2">
                                <label className="block text-xs font-bold text-slate-500 mb-1">事案No.</label>
                                <input 
                                    ref={noRef}
                                    type="text" 
                                    name="no" 
                                    value={formData.no} 
                                    onChange={handleInputChange} 
                                    onKeyDown={(e) => handleKeyDown(e, startRef)}
                                    placeholder="12345" 
                                    className="w-full text-sm border-slate-300 rounded-md shadow-sm p-2 border" 
                                />
                            </div>
                            <div className="md:col-span-3">
                                <label className="block text-xs font-bold text-slate-500 mb-1">開始時間</label>
                                <input 
                                    ref={startRef}
                                    type="time" 
                                    name="start" 
                                    value={formData.start} 
                                    onChange={handleInputChange} 
                                    onKeyDown={(e) => handleKeyDown(e, endRef)}
                                    className="w-full text-sm border-slate-300 rounded-md shadow-sm p-2 border" 
                                />
                            </div>
                            <div className="md:col-span-3">
                                <label className="block text-xs font-bold text-slate-500 mb-1">終了時間</label>
                                <input 
                                    ref={endRef}
                                    type="time" 
                                    name="end" 
                                    value={formData.end} 
                                    onChange={handleInputChange} 
                                    onKeyDown={(e) => handleKeyDown(e, descRef)}
                                    className="w-full text-sm border-slate-300 rounded-md shadow-sm p-2 border" 
                                />
                            </div>

                            {/* 下段: 内容, 直行, 追加ボタン */}
                            <div className="md:col-span-8">
                                <label className="block text-xs font-bold text-slate-500 mb-1">内容・備考</label>
                                <input 
                                    ref={descRef}
                                    type="text" 
                                    name="desc" 
                                    value={formData.desc} 
                                    onChange={handleInputChange} 
                                    onKeyDown={(e) => handleKeyDown(e, continuousRef)} 
                                    placeholder="活動内容を入力..." 
                                    className="w-full text-sm border-slate-300 rounded-md shadow-sm p-2 border" 
                                />
                            </div>
                             <div className="md:col-span-2 flex items-center justify-center h-10 bg-slate-50 rounded border border-slate-200 mb-[1px]">
                                <label className="flex items-center gap-2 text-xs text-slate-600 cursor-pointer select-none">
                                    <input 
                                        ref={continuousRef}
                                        type="checkbox" 
                                        name="isContinuous" 
                                        checked={formData.isContinuous} 
                                        onChange={handleInputChange} 
                                        onKeyDown={(e) => handleKeyDown(e, null)}
                                        className="rounded border-slate-300 text-blue-600 focus:ring-blue-500" 
                                    />
                                    <span>連続出動</span>
                                </label>
                            </div>
                            <div className="md:col-span-2">
                                <button 
                                    type="button" 
                                    onClick={handleAddOrUpdate} 
                                    className={`w-full text-white font-medium h-10 rounded-md shadow-sm flex justify-center items-center gap-1 transition-colors ${editingId ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-600 hover:bg-blue-700'}`}
                                >
                                    {editingId ? <><Icons.CheckCircle className="w-4 h-4" /> 更新</> : <><Icons.Plus className="w-4 h-4" /> 追加</>}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Legend */}
                    <div className="flex flex-wrap gap-3 mb-4 px-2 print:mb-2 print-break-avoid">
                        {Object.values(CATEGORIES).map(c => (
                            <div key={c.id} className="flex items-center gap-2 text-xs bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm print:border-slate-300 print:shadow-none">
                                <div className={`w-3 h-3 rounded-full ${c.color.split(' ')[0]} print-color-adjust`}></div>
                                <span className="text-slate-700">{c.label}</span>
                            </div>
                        ))}
                        <div className="flex items-center gap-2 text-xs bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm print:border-slate-300">
                            <div className="w-3 h-3 bg-yellow-400 opacity-50 striped-bg print-color-adjust"></div>
                            <span className="text-slate-500">準備(10分)</span>
                        </div>
                        <div className="flex items-center gap-2 text-xs bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm print:border-slate-300">
                            <div className="w-3 h-3 bg-green-100 border border-green-200 print-color-adjust"></div>
                            <span className="text-slate-500">復帰作業</span>
                        </div>
                    </div>

                    {/* Timeline */}
                    <div className="relative bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden min-h-[400px] mb-8 print:shadow-none print:border print:mb-4 print-break-avoid">
                        <div className="overflow-x-auto pb-12 pt-12 relative min-w-[1200px] print-full-width">
                            {/* Time Labels */}
                            <div className="absolute top-4 left-4 right-4 h-6 pointer-events-none select-none z-20">
                                {Array.from({ length: Math.floor(TOTAL_HOURS) + 1 }).map((_, i) => (
                                    <div key={i} className="absolute transform -translate-x-1/2" style={{ left: `${(i / TOTAL_HOURS) * 100}%` }}>
                                        <span className="text-xs font-bold text-slate-400 print:text-slate-600">{START_HOUR + i}:00</span>
                                    </div>
                                ))}
                            </div>
                            {/* Grid */}
                            <div className="absolute top-10 left-4 right-4 bottom-4 pointer-events-none select-none z-0">
                                {Array.from({ length: Math.floor(TOTAL_HOURS) + 1 }).map((_, i) => (
                                    <div key={`line-${i}`} className="absolute top-0 bottom-0 w-px bg-slate-100 print:bg-slate-200 transform -translate-x-1/2" style={{ left: `${(i / TOTAL_HOURS) * 100}%` }}></div>
                                ))}
                                {Array.from({ length: Math.floor(TOTAL_HOURS) }).map((_, i) => (
                                    <div key={`dash-${i}`} className="absolute top-0 bottom-0 w-px border-l border-slate-200 border-dashed opacity-60 print:opacity-40 transform -translate-x-1/2" style={{ left: `${((i + 0.5) / TOTAL_HOURS) * 100}%` }}></div>
                                ))}
                            </div>
                            {/* Events */}
                            <div className="relative h-[300px] mt-6 mx-4 z-10">
                                <div className="absolute top-1/2 left-0 w-full h-px bg-slate-200 print:bg-slate-300 -z-10"></div>
                                {sortedEvents.length === 0 && <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-slate-300 font-bold text-lg pointer-events-none">データがありません。</div>}
                                {sortedEvents.map((event, index) => {
                                    const startMins = timeToMinutes(event.start);
                                    const endMins = timeToMinutes(event.end);
                                    const duration = endMins - startMins;
                                    const recoveryDuration = getRecoveryDuration(event);
                                    let prepDuration = getBasePrepDuration(event);
                                    if (index > 0 && sortedEvents[index - 1].isContinuous) prepDuration = 0;
                                    const prepStartMins = startMins - prepDuration;
                                    
                                    const mainPos = getPosition(startMins, duration);
                                    const prepPos = getPosition(prepStartMins, prepDuration);
                                    const recoveryPos = getPosition(endMins, recoveryDuration);

                                    const categoryConfig = Object.values(CATEGORIES).find(c => c.id === event.category) || CATEGORIES.OTHER;
                                    const isHovered = hoveredId === event.id;
                                    const isEditing = editingId === event.id;
                                    
                                    return (
                                        <div key={event.id} className="absolute h-full pointer-events-none" style={{ width: '100%', top: 0, zIndex: 20 }}>
                                            {/* Prep */}
                                            {prepDuration > 0 && (
                                                <div className="absolute transform -translate-y-1/2 h-10 bg-yellow-400/30 border-l border-t border-b border-yellow-400/50 rounded-l-md pointer-events-auto transition-all print-color-adjust"
                                                    style={{ top: '50%', left: prepPos.left, width: prepPos.width, backgroundImage: 'linear-gradient(45deg, rgba(255,255,255,.3) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.3) 50%, rgba(255,255,255,.3) 75%, transparent 75%, transparent)', backgroundSize: '10px 10px' }}
                                                    title="要請・準備・エンジンスタート (10分)" />
                                            )}
                                            {/* Main */}
                                            <div className={`absolute transform -translate-y-1/2 transition-all duration-300 pointer-events-auto group rounded-md border-b-4 shadow-sm flex flex-col justify-center items-center cursor-pointer overflow-hidden ${categoryConfig.color} ${isHovered || isEditing ? 'scale-105 shadow-md brightness-110 z-30' : ''} ${isEditing ? 'ring-2 ring-amber-400' : ''} print-color-adjust`}
                                                style={{ top: '50%', left: mainPos.left, width: mainPos.width, height: '64px' }}
                                                onClick={() => handleEditClick(event)}
                                                onMouseEnter={() => setHoveredId(event.id)}
                                                onMouseLeave={() => setHoveredId(null)}
                                            >
                                                <div className="flex items-center gap-1 text-white font-bold text-xs px-1">
                                                    {event.category === 'cancel' && <Icons.AlertCircle className="w-4 h-4" />}
                                                    {event.category === 'group' && <Icons.Users className="w-4 h-4" />}
                                                    {event.category === 'inspection' && <Icons.Settings className="w-4 h-4" />}
                                                    {event.category === 'mission' && <Icons.CheckCircle className="w-4 h-4" />}
                                                    {event.category === 'other' && <Icons.Briefcase className="w-4 h-4" />}
                                                </div>
                                                {isHovered && !isEditing && (
                                                    <div className="absolute bottom-full mb-2 w-64 bg-slate-800 text-white text-xs rounded p-3 shadow-xl z-50 pointer-events-none left-1/2 -translate-x-1/2 no-print">
                                                        <div className="font-bold text-yellow-400 mb-1 flex items-center justify-between"><span>{event.no ? `#${event.no}` : categoryConfig.label}</span><span className="text-[10px] bg-white/20 px-1 rounded">{event.category}</span></div>
                                                        <div className="mb-2 text-slate-300 font-mono border-b border-slate-600 pb-1">{event.start} - {event.end} ({duration}分){prepDuration === 0 && <span className="ml-2 text-green-300 font-bold">(直行)</span>}</div>
                                                        <div className="leading-relaxed">{event.desc}</div>
                                                        <div className="mt-2 pt-1 text-center text-amber-400 text-[10px]">クリックで修正</div>
                                                    </div>
                                                )}
                                            </div>
                                            {/* Recovery */}
                                            {recoveryDuration > 0 && (
                                                <div className="absolute transform -translate-y-1/2 h-10 bg-green-50 border border-green-200 border-l-0 rounded-r-md pointer-events-auto flex items-center justify-center opacity-80 hover:opacity-100 transition-opacity print-color-adjust"
                                                    style={{ top: '50%', left: recoveryPos.left, width: recoveryPos.width }}
                                                    title={`復帰作業・記録・整備 (${recoveryDuration}分)`}>
                                                    <span className="text-[9px] text-green-700 font-medium truncate px-1">{parseFloat(recoveryPos.width) > 3 ? `復帰${recoveryDuration}` : ''}</span>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* List */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print:shadow-none print:border print-break-avoid">
                        <div className="bg-slate-50 px-6 py-3 border-b border-slate-200 font-semibold text-slate-700 flex items-center gap-2 text-sm print:bg-white print:border-b-2 print:border-slate-800">
                            <Icons.ClipboardList className="w-4 h-4" /> 登録済みデータリスト
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 text-slate-500 text-xs uppercase print:bg-white print:text-black print:border-b">
                                    <tr>
                                        <th className="px-4 py-3 w-16">種別</th>
                                        <th className="px-4 py-3 w-24">No/ID</th>
                                        <th className="px-4 py-3 w-32">時間</th>
                                        <th className="px-4 py-3 w-24">所要時間</th>
                                        <th className="px-4 py-3">内容</th>
                                        <th className="px-4 py-3 w-24 text-center no-print">操作</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 print:divide-slate-200">
                                    {sortedEvents.map((event) => {
                                        const startMins = timeToMinutes(event.start);
                                        const endMins = timeToMinutes(event.end);
                                        const cat = Object.values(CATEGORIES).find(c => c.id === event.category) || CATEGORIES.OTHER;
                                        const isHovered = hoveredId === event.id;
                                        const isEditing = editingId === event.id;
                                        return (
                                            <tr key={event.id} className={`transition-colors ${isEditing ? 'bg-amber-50' : isHovered ? 'bg-yellow-50' : 'hover:bg-slate-50'} print:bg-white`} onMouseEnter={() => setHoveredId(event.id)} onMouseLeave={() => setHoveredId(null)}>
                                                <td className="px-4 py-3"><div className={`w-3 h-3 rounded-full ${cat.color.split(' ')[0]} print-color-adjust`} title={cat.label}></div></td>
                                                <td className="px-4 py-3 font-mono font-bold">{event.no || '-'}</td>
                                                <td className="px-4 py-3 font-mono whitespace-nowrap">{event.start} - {event.end}</td>
                                                <td className="px-4 py-3 text-slate-600">{endMins - startMins}分</td>
                                                <td className="px-4 py-3 text-slate-600 truncate max-w-xs print:max-w-none print:whitespace-normal" title={event.desc}>{event.desc}</td>
                                                <td className="px-4 py-3 text-center flex justify-center gap-2 no-print">
                                                    <button onClick={() => handleEditClick(event)} className={`transition-colors ${isEditing ? 'text-amber-600' : 'text-slate-400 hover:text-blue-600'}`} title="修正"><Icons.Edit3 className="w-4 h-4" /></button>
                                                    <button onClick={() => handleDelete(event.id)} className="text-slate-400 hover:text-red-500 transition-colors" title="削除"><Icons.Trash2 className="w-4 h-4" /></button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DailyTimelineApp />);
    </script>
</body>
</html>
